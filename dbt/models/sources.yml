version: 2

sources:
  - name: raw
    schema: raw
    freshness:
      warn_after: {count: 3, period: day}
      error_after: {count: 7, period: day}
    loaded_at_field: "CAST(extracted_at AS TIMESTAMP)"
    tables:
      - name: ticketmaster_events
        columns:
          - name: event_id
            tests:
              - not_null
              - unique
      - name: setlistfm_setlists
        columns:
          - name: setlist_id
            tests:
              - not_null
              - unique
      - name: musicbrainz_artists
        columns:
          - name: mbid
            tests:
              - not_null
